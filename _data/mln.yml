    title: "Self-Distillation Enables Continual Learning"
    cover: "https://images.lumacdn.com/uploads/7i/abcae379-f22d-4d83-8810-87766cbd4f40.png"
    summary: "Why does on-policy learning dramatically reduce catastrophic forgetting? Does SDFT outperform SFT, RLHF-style pipelines, and continual pre-training?"
    description: >-
      Why does on-policy learning dramatically reduce catastrophic forgetting?
      Does SDFT outperform SFT, RLHF-style pipelines, and continual
      pre-training? This week we read Self-Distillation Fine-Tuning (SDFT), a
      framework for continual learning that casts the model as both teacher and
      student at once — generating its own on-policy training data so it can
      absorb new tasks while preserving what it already knows. Join us at CASI
      for discussion at 8 pm, (optional) quiet reading from 7 pm.
    reading:
      - title: "Self-Distillation Enables Continual Learning"
        url: "https://arxiv.org/pdf/2601.19897"
  - num: 7
    slug: "okwrdjl7"
    evt: "evt-UiqEgfiHOo1vTcQ"
    status: past
    title: "In-context Learning and Induction Heads"
    cover: "https://images.lumacdn.com/uploads/2n/b777d557-7995-4db7-9060-373e6f4b910f.png"
    summary: "When does a model suddenly learn to learn — and can you spot the moment on the loss curve? If a circuit is defined to do nothing but copy random text, why does the same circuit also translate French?"
    description: >-
      When does a model suddenly learn to learn — and can you spot the moment on
      the loss curve? If a circuit is defined to do nothing but copy random
      text, why does the same circuit also translate French? The sequel to the
      Mathematical Framework paper, this work argues that induction heads — which
      complete patterns by finding and copying earlier occurrences — are the
      mechanism behind most in-context learning, and that the bulk of a model’s
      in-context ability appears in a sharp phase change exactly when these heads
      form. Join us at CASI for discussion at 8 pm, (optional) quiet reading from
      7 pm.
    reading:
      - title: "In-context Learning and Induction Heads — Olsson, Elhage, Nanda, et al. (Anthropic)"
        url: "https://transformer-circuits.pub/2022/in-context-learning-and-induction-heads/index.html"
  - num: 8
    slug: "ov4cf4jy"
    evt: "evt-WYLAOC0uKYiofUb"
    status: upcoming
    title: "Mapping the neuronal building blocks of human language with language models"
    cover: "https://images.lumacdn.com/uploads/km/e9ac657e-b6bd-4dab-807c-3caab3f5bb6d.webp"
    summary: "A full second before you speak a word, some neuron has already decided whether it's a noun or a verb — how does a single cell know your grammar in advance?"
    description: >-
      A full second before you speak a word, some neuron has already decided
      whether it's a noun or a verb — how does a single cell know your grammar
      in advance? And why do the embeddings from a large language model predict
      when a neuron in your temporal lobe will fire — what does that say about
      whether brains and models build language the same way? The paper sketches
      a cellular-scale map of how the brain assembles words into sentences.
      Researchers record from hundreds of individual neurons across the human
      frontotemporal cortex while people speak naturally, then uses natural
      language processing models to label and track fine-grained linguistic
      features of each word. Some neurons fire selectively for a word's part of
      speech or its grammatical relationship to other words; others track
      higher-order structure — how words group into phrases, where phrases
      merge, and their sequence. Strikingly, syntax and meaning turned out to be
      handled largely by separate cells — only a tiny fraction of neurons
      encoded both syntactic and semantic information — suggesting the two are
      dissociable at the single-cell level. Contextual embeddings from a large
      language model (Vicuna) predicted neural activity better than syntax or
      semantics alone, and that predictivity climbed up to roughly a second
      before each word was spoken — implying these cells integrate several words
      of preceding context as they plan speech. Although the neurons were
      distributed broadly across the cortex, their encoding strength was
      left-lateralized and varied between regions. Join us at CASI for
      discussion at 8 pm, and (optional) quiet reading from 7 pm.
    reading:
      - title: "Mapping the Neuronal Building Blocks of Human Language with Language Models — Cai, Kfir, Jamali, et al. (Harvard / Mass General)"
        url: "https://www.nature.com/articles/s41586-026-10691-5"
      - title: "Nature news (optional paper overview)"
        url: "https://www.nature.com/articles/d41586-026-01922-w"
  - num: 9
    slug: "gfk5xp1o"
    evt: "evt-sYrcAstM80gnHU6"
    status: upcoming
    title: "Nested Learning: The Illusion of Deep Learning Architectures"
    cover: "https://images.lumacdn.com/uploads/cs/880fc699-e930-41e2-b892-d7de04dac10f.png"
    summary: "How might nested optimization structures allow models to generalize more efficiently by reusing global representations while adapting locally to new tasks? Could the hierarchical nature of nested learning make large models inherently more resilient to poisoning or backdoor attempts by isolating adversarial influence within inner-loop adaptations?"
    description: >-
      How might nested optimization structures allow models to generalize more
      efficiently by reusing global representations while adapting locally to new
      tasks? Could the hierarchical nature of nested learning make large models
      inherently more resilient to poisoning or backdoor attempts by isolating
      adversarial influence within inner-loop adaptations? A recent study by
      Google Research introduces Nested Learning (NL): a new paradigm that
      redefines deep learning as a hierarchy of nested optimization problems
      rather than stacked layers. The authors argue that modern neural networks,
      including Transformers, effectively compress their own context flow, and
      that in-context learning emerges naturally from this internal compression
      process. Through this framework, common algorithms such as SGD and Adam are
      reinterpreted as associative memory modules that store and adapt to
      gradient information. Building on these insights, the paper presents HOPE, a
      self-referential model that learns to modify its own update rules using a
      continuum memory system inspired by human neuroplasticity. Empirical results
      across language modeling and reasoning benchmarks show that HOPE outperforms
      recent architectures like DeltaNet and Titans, particularly in long-context
      reasoning and continual learning. These findings suggest a new direction for
      AI model design, toward systems that learn across multiple timescales and
      self-optimize beyond traditional backpropagation. Join us at CASI for
      discussion at 8 pm, and (optional) quiet reading from 7 pm.
    reading:
      - title: "Nested Learning: The Illusion of Deep Learning Architectures — Behrouz et al. (Google Research)"
        url: "https://abehrouz.github.io/files/NL.pdf"
  - num: 10
    slug: "lbszsb1n"
    evt: "evt-gcthBtp5jBKOiQo"
    status: upcoming
    title: "From Worm to Human"
    cover: "https://images.lumacdn.com/uploads/km/c297387a-df03-41e1-bb47-bea1a7497ff6.png"
    summary: "We've had the full wiring diagram of a ~300-neuron worm for decades — and now one for a 140,000-neuron fly. So what actually stands between that and emulating the ~86 billion neurons in your head?"
    description: >-
      We've had the full wiring diagram of a ~300-neuron worm for decades — and
      now one for a 140,000-neuron fly. So what actually stands between that and
      emulating the ~86 billion neurons in your head? Today's largest AI clusters
      are already within striking distance of the raw compute a real-time human-
      brain emulation would need. If the silicon is nearly there, is the real
      bottleneck the microscope? From Worm to Human: Scaling Brain Emulation Isaak
      Freeman (MIT, Boyden Lab) This thesis argues that high-quality, biologically
      faithful emulation of whole brains — starting with model organisms and
      aiming eventually at humans — is far more tractable than it sounds, and the
      case comes from bridging four fields that rarely talk to each other:
      connectomics, functional imaging, neural simulation, and AI hardware.
      Connectomics has jumped from the only complete connectome being a 302-neuron
      roundworm to a full adult fruit-fly brain of roughly 140,000 neurons, while
      the cost to reconstruct a single neuron has fallen from about $16,500 to
      roughly $100, and functional imaging now reaches near-complete coverage of
      larval zebrafish brains and around a million cortical neurons in mice.
      Translating all of this into common units, the author uses order-of-
      magnitude estimates to reduce whole-brain emulation to concrete hardware
      demands — and finds that mid-2020s AI clusters (about 4e20 FLOP/s) are
      already close to a rough estimate of what a real-time human emulation would
      need (about 6e20 FLOP/s). Crude human-scale simulations of tens of billions
      of neurons have already been run, though the work carefully distinguishes a
      true emulation — one that matches a brain's internal causal dynamics at a
      chosen level of detail — from these proofs-of-concept, and argues that C.
      elegans, larval zebrafish, and Drosophila are the compelling near-term
      targets for building the methods needed to scale toward human brains. Join
      us at CASI for discussion at 8 pm, and (optional) quiet reading from 7 pm.
    reading:
      - title: "From Worm to Human: Scaling Brain Emulation"
        url: "https://pdf.isaak.net/thesis"
  - num: 11
    slug: "5wvhx171"
    evt: "evt-r6zcq5sAFOwiOEh"
    status: upcoming
    title: "Manifold-Constrained Hyper-Connections"
    cover: "https://images.lumacdn.com/gallery-images/wx/3b0a8406-85d0-426f-a10d-f00084982b88.png"
    summary: "How does constraining residual connections to a geometric manifold restore identity mappings and enable stable scaling in large language models? Can richer cross-layer connectivity improve reasoning and representation quality without sacrificing optimization stability?"
    description: >-
      How does constraining residual connections to a geometric manifold restore
      identity mappings and enable stable scaling in large language models? Can
      richer cross-layer connectivity improve reasoning and representation
      quality without sacrificing optimization stability? DeepSeek’s
      Manifold-Constrained Hyper-Connections (mHC) introduce a principled fix to
      recent attempts at widening residual streams. While Hyper-Connections
      improve performance by allowing richer cross-layer mixing, their
      unconstrained residual matrices break the identity-mapping property that
      makes deep networks trainable, leading to severe instability at scale. mHC
      resolves this by projecting residual mixing matrices onto the manifold of
      doubly stochastic matrices, ensuring residual updates remain convex
      combinations of features and preserving signal magnitude across depth.
      Empirically, this constraint dramatically stabilizes training in large
      language models, eliminating gradient explosions observed in unconstrained
      HC while retaining its performance gains. With careful systems
      co-design—kernel fusion, recomputation, and pipeline overlap—mHC incurs
      only ~6–7% overhead at 27B scale, while consistently improving downstream
      reasoning benchmarks. The result reframes architectural scaling as a
      geometric constraint problem, showing that richer connectivity can be
      safely exploited when paired with mathematically grounded structure rather
      than ad-hoc regularization. Join us at CASI for discussion at 8 pm, and
      (optional) quiet reading from 7 pm.
    reading:
      - title: "mHC: Manifold-Constrained Hyper-Connections — DeepSeek"
        url: "https://www.arxiv.org/pdf/2512.24880"
  - num: 12
    slug: "srsz8rga"
    evt: "evt-v89wbXHXDCt5bik"
    status: upcoming
    title: "Attention Residuals: Rethinking Information Flow in LLMs"
    cover: "https://images.lumacdn.com/gallery-images/l6/26a28b85-5c4f-4d9a-a09a-e401c29ce330.png"
    summary: "Standard residual connections with PreNorm accumulate every layer’s output with fixed unit weights, letting the hidden state grow uncontrollably with depth and diluting each layer’s unique contribution — what if each layer could instead learn which earlier representations to read from?"
    description: >-
      Standard residual connections with PreNorm accumulate every layer’s output
      with fixed unit weights, letting the hidden state grow uncontrollably with
      depth and diluting each layer’s unique contribution — what if each layer
      could instead learn which earlier representations to read from? This paper
      introduces Attention Residuals (AttnRes), a novel architectural mechanism
      by the Kimi Team designed to rethink how information flows in modern Large
      Language Models. The central challenge is that standard residual
      connections with PreNorm accumulate all layer outputs using fixed unit
      weights; this uniform aggregation causes uncontrolled hidden-state growth
      with depth, progressively diluting each layer’s unique contribution. To
      overcome this limitation, the authors replace the fixed accumulation with a
      softmax attention mechanism over preceding layer outputs, allowing each
      layer to selectively aggregate earlier representations using learned,
      input-dependent weights. Join us at CASI for discussion at 8 pm, and
      (optional) quiet reading from 7 pm.
    reading:
      - title: "Attention Residuals: Rethinking Information Flow in LLMs — Kimi Team"
        url: "https://arxiv.org/pdf/2603.15031"
  - num: 13
    slug: "lh8qgar2"
    evt: "evt-FqbMX8pVOgTu3xT"
    status: upcoming
    title: "Fundamental Limitations of Single-Vector Embeddings"
    cover: "https://images.lumacdn.com/gallery-images/s0/94a98dc7-f16e-4e74-b733-4b62747a738d.png"
    summary: "Why does something as simple as “finding people who like apples” break our best models? What do alternatives like multi-vector models or cross-encoders mean for real products?"
    description: >-
      Why does something as simple as “finding people who like apples” break our
      best models? What do alternatives like multi-vector models or
      cross-encoders mean for real products? This research establishes a
      fundamental mathematical constraint in dense retrieval: embedding models
      cannot represent all possible top-k combinations of relevant documents
      simultaneously. Weller et al. demonstrate this through both theory and a
      clever benchmark (LIMIT) where even advanced state-of-the-art models
      struggle with trivially simple queries, suggesting important implications
      for instruction-following retrieval systems. Join us at CASI for discussion
      at 8 pm, and (optional) quiet reading from 7 pm.
    reading:
      - title: "On the Theoretical Limitations of Embedding-Based Retrieval — Weller et al."
        url: "https://arxiv.org/abs/2508.21038"
